apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:1.25.3   # valid tag (fix)
          ports:
            - containerPort: 80
